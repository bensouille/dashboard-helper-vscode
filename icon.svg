<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="#1e1e2e"/>

  <!-- Monitor body -->
  <rect x="10" y="26" width="108" height="68" rx="9" fill="#252526" stroke="#569cd6" stroke-width="4"/>

  <!-- Title bar separator -->
  <line x1="10" y1="44" x2="118" y2="44" stroke="#569cd6" stroke-width="2" opacity="0.4"/>

  <!-- 3 signal dots in title bar (right side — live-reporting indicator) -->
  <circle cx="72" cy="35" r="5" fill="#4ec9b0" opacity="0.30"/>
  <circle cx="86" cy="35" r="5" fill="#4ec9b0" opacity="0.60"/>
  <circle cx="100" cy="35" r="5" fill="#4ec9b0"/>

  <!-- Terminal prompt  >  (chevron) -->
  <path d="M 22 53 L 39 64 L 22 75"
        fill="none" stroke="#4ec9b0" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor underscore -->
  <rect x="46" y="76" width="20" height="5" rx="2.5" fill="#4ec9b0"/>

  <!-- Session lines (content area) -->
  <rect x="46" y="54" width="55" height="5" rx="2.5" fill="#569cd6" opacity="0.65"/>
  <rect x="46" y="64" width="38" height="5" rx="2.5" fill="#569cd6" opacity="0.35"/>

  <!-- Monitor stand neck -->
  <line x1="64" y1="94" x2="64" y2="107"
        stroke="#569cd6" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Monitor stand base -->
  <line x1="44" y1="107" x2="84" y2="107"
        stroke="#569cd6" stroke-width="4.5" stroke-linecap="round"/>
</svg>
